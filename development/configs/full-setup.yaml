consumer:
  bootstrap-servers: ["kafka:9093"]
  commit-modulo: 300
  topics:
  - outbox.event.hbi.hosts
  - host-inventory.hbi.hosts
  retry-options:
    consumer-max-retries: -1
    operation-max-retries: -1
    backoff-factor: 5
    max-backoff-seconds: 30
  auth:
    enabled: false
client:
  enabled: true
  url: "inventory-api:9081"
  insecure-client: true
  enable-oidc-auth: true
  client-id: "<client-id>"
  client-secret: "<client-secret"
  # Must be the token URL that accepts POST (client_credentials), not the realm root
  sso-token-endpoint: "https://example.com/token"  
log:
  level: "debug"
