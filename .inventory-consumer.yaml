consumer:
  enabled: true
  bootstrap-servers: localhost:9092
  topics:
  - outbox.event.hbi.hosts
  retry-options:
    consumer-max-retries: 3
    operation-max-retries: 4
    backoff-factor: 5
  auth:
    enabled: false
client:
  enabled: true
  url: "localhost:9000"
  enable-oidc-auth: false
  insecure-client: true
  # optional: static JWT sent as Per-RPC credentials when insecure-client is true (no TLS)
  # bearer-token: "<your-jwt>"
log:
  level: "info"
